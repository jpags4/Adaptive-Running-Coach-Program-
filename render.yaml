services:
  - type: web
    name: adaptive-half-marathon-coach
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && cd frontend && npm ci && npm run build"
    startCommand: python3 app.py
    envVars:
      - key: APP_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: DATABASE_URL
        fromDatabase:
          name: adaptive-running-coach-db
          property: connectionString
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: WHOOP_CLIENT_ID
        sync: false
      - key: WHOOP_CLIENT_SECRET
        sync: false
      - key: ATHLETE_NAME
        sync: false
      - key: GOAL_RACE_DATE
        sync: false
      - key: PREFERRED_LONG_RUN_DAY
        value: Sunday
      - key: ALLOW_INSECURE_SSL
        value: "false"
